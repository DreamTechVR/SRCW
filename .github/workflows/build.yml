name: Build SRCW

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build
      run: msbuild SRCW.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /m

    - name: Upload Debug artifact
      if: matrix.configuration == 'Debug'
      uses: actions/upload-artifact@v4
      with:
        name: SRCW-Debug-x64
        path: x64/Debug/SRCW.dll

    - name: Upload Release artifact
      if: matrix.configuration == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: SRCW-Release-x64
        path: x64/Release/umpdc.dll

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download Release DLL
      uses: actions/download-artifact@v4
      with:
        name: SRCW-Release-x64
        path: release/

    - name: Prepare release package
      run: cp SRCW.ini release/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: SRCWUnlocker ${{ github.ref_name }}
        files: |
          release/umpdc.dll
          release/SRCW.ini
        generate_release_notes: true
        draft: false
